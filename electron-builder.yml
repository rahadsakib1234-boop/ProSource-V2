appId: com.prosource.crm
productName: ProSource CRM

directories:
  buildResources: assets
  output: release

files:
  - dist/**/*          # includes dist/public and dist/electron with their subfolders
  - package.json
  - assets/**/*

# Ensure the main entry is correct (relative to the asar root)
extraMetadata:
  main: dist/electron/main.js

win:
  target:
    - nsis       # or portable
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.business

linux:
  target:
    - AppImage
    - deb
  category: Office
