appId: com.prosource.crm
productName: ProSource CRM

directories:
  buildResources: assets
  output: release

files:
  - from: dist
    to: .
    filter:
      - '**/*'
  - from: package.json
    to: .
  - from: assets
    to: dist/assets
    filter:
      - '**/*'

win:
  target:
    - nsis
    - portable

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.business

linux:
  target:
    - AppImage
    - deb
  category: Office
